<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Trademark Flooring</title>
  <desc id="desc">Circular heritage seal with a mature oak tree and roots</desc>
  <defs>
    <path id="topArc" d="M42 132a86 86 0 0 1 172 0"/>
    <path id="bottomArc" d="M38 139a91 91 0 0 0 180 0"/>
    <filter id="ink" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency=".82" numOctaves="2" seed="19" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale=".45"/>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="122" fill="#f3eee5"/>
  <g fill="none" stroke="#433d37">
    <circle cx="128" cy="128" r="116" stroke-width="3.5"/>
    <circle cx="128" cy="128" r="108" stroke-width="2.25"/>
  </g>

  <g fill="#433d37" font-family="'Arial Narrow','Roboto Condensed','Helvetica Neue',Arial,sans-serif" font-weight="700" text-anchor="middle" filter="url(#ink)">
    <text font-size="23" letter-spacing="5.2"><textPath href="#topArc" startOffset="50%">TRADEMARK</textPath></text>
    <text font-size="23" letter-spacing="6"><textPath href="#bottomArc" startOffset="50%">FLOORING</textPath></text>
  </g>

  <g fill="#433d37">
    <circle cx="29" cy="132" r="5"/>
    <circle cx="227" cy="132" r="5"/>
  </g>

