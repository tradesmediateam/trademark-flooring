    <circle cx="67" cy="110" r="9"/><circle cx="86" cy="95" r="10"/><circle cx="105" cy="88" r="11"/>
    <circle cx="128" cy="86" r="12"/><circle cx="151" cy="91" r="12"/><circle cx="174" cy="101" r="11"/>
    <circle cx="188" cy="119" r="10"/><circle cx="158" cy="115" r="14"/><circle cx="129" cy="108" r="15"/>
    <circle cx="99" cy="113" r="14"/><circle cx="76" cy="124" r="11"/>
