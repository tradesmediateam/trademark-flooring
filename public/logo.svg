<svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="woodGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0825D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5335;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="woodGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D7E56;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B39968;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A6344;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8C89A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A574;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer Circle (Heritage Frame) -->
  <circle cx="140" cy="85" r="75" fill="none" stroke="url(#goldAccent)" stroke-width="2" opacity="0.6"/>

  <!-- Wood Plank 1 (Left, darker) -->
  <path d="M 85 50 Q 100 65 100 85 Q 100 105 85 120 L 95 120 Q 115 105 115 85 Q 115 65 95 50 Z"
        fill="url(#woodGrad1)" opacity="0.95"/>
  <path d="M 88 58 Q 100 68 100 85 Q 100 100 90 115"
        stroke="#5A4728" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Wood Plank 2 (Center) -->
  <path d="M 110 40 Q 140 55 140 85 Q 140 115 110 130 L 120 130 Q 155 115 155 85 Q 155 55 120 40 Z"
        fill="url(#woodGrad2)" opacity="0.95"/>
  <path d="M 115 48 Q 140 62 140 85 Q 140 107 120 125"
        stroke="#5A4728" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Wood Plank 3 (Right, lighter) -->
  <path d="M 165 50 Q 180 65 180 85 Q 180 105 165 120 L 175 120 Q 195 105 195 85 Q 195 65 175 50 Z"
        fill="url(#woodGrad1)" opacity="0.9"/>
  <path d="M 170 58 Q 180 68 180 85 Q 180 100 170 115"
        stroke="#5A4728" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Tree/Growth element at top (stylized) -->
  <g opacity="0.7">
    <path d="M 140 15 L 135 30 L 130 25 M 140 15 L 145 30 L 150 25" stroke="#8B6F47" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="140" cy="18" r="2.5" fill="#D4A574"/>
  </g>

  <!-- Decorative ring (heritage mark) -->
  <circle cx="140" cy="85" r="62" fill="none" stroke="#A0825D" stroke-width="1" opacity="0.4" stroke-dasharray="3,2"/>

  <!-- Wood grain texture lines -->
  <g stroke="#6B5335" stroke-width="0.3" opacity="0.3" fill="none">
    <path d="M 95 62 Q 110 75 115 85"/>
    <path d="M 90 70 Q 110 80 125 92"/>
    <path d="M 160 65 Q 175 78 185 90"/>
    <path d="M 170 70 Q 185 82 190 100"/>
  </g>

  <!-- Gold accent line (quality mark) -->
  <line x1="80" y1="85" x2="200" y2="85" stroke="url(#goldAccent)" stroke-width="1.5" opacity="0.5"/>
</svg>
