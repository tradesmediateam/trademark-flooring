<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trademark Flooring">
  <defs>
    <style>
      .ink { fill: #3A2A1A; }
      .gold { fill: #9C7C3C; }
      .stroke-ink { fill: none; stroke: #3A2A1A; }
      .stroke-gold { fill: none; stroke: #9C7C3C; }
    </style>
  </defs>

  <!-- Outer + inner rings -->
  <circle cx="200" cy="200" r="191" class="stroke-ink" stroke-width="4"/>
  <circle cx="200" cy="200" r="176" class="stroke-ink" stroke-width="2"/>

  <!-- Side vintage flourishes -->
  <g class="ink">
    <circle cx="18" cy="200" r="4"/>
    <circle cx="382" cy="200" r="4"/>
    <circle cx="30" cy="200" r="2.5"/>
    <circle cx="370" cy="200" r="2.5"/>
  </g>

  <!-- Tree canopy (bushy heritage crown) -->
  <g class="gold">
    <circle cx="200" cy="108" r="42"/>
    <circle cx="158" cy="120" r="38"/>
    <circle cx="242" cy="120" r="38"/>
    <circle cx="132" cy="158" r="37"/>
    <circle cx="268" cy="158" r="37"/>
    <circle cx="200" cy="150" r="60"/>
    <circle cx="160" cy="188" r="34"/>
    <circle cx="240" cy="188" r="34"/>
    <circle cx="200" cy="195" r="40"/>
  </g>

  <!-- Trunk + roots -->
  <path class="gold" d="M193 196
    L188 250
    Q186 258 178 262
    Q189 256 200 254
    Q211 256 222 262
    Q214 258 212 250
    L207 196 Z"/>

  <!-- Inner branch lines for texture -->
  <g class="stroke-ink" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <path d="M200 210 L200 168"/>
    <path d="M200 190 Q182 178 172 158"/>
    <path d="M200 190 Q218 178 228 158"/>
    <path d="M200 175 Q190 165 184 150"/>
    <path d="M200 175 Q210 165 216 150"/>
  </g>

  <!-- Company name -->
  <text x="200" y="300" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700"
        font-size="46" letter-spacing="1" class="ink">TRADEMARK</text>

  <!-- Divider dashes -->
  <g class="stroke-ink" stroke-width="2">
    <line x1="120" y1="315" x2="150" y2="315"/>
    <line x1="250" y1="315" x2="280" y2="315"/>
  </g>
  <circle cx="200" cy="315" r="2.5" class="ink"/>

  <text x="200" y="332" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="600"
        font-size="21" letter-spacing="9" class="ink">FLOORING</text>

  <!-- Herringbone parquet band -->
  <g class="stroke-gold" stroke-width="3" stroke-linecap="round">
    <path d="M150 352 l10 -12 l10 12"/>
    <path d="M172 352 l10 -12 l10 12"/>
    <path d="M194 352 l10 -12 l10 12"/>
    <path d="M216 352 l10 -12 l10 12"/>
    <path d="M238 352 l10 -12 l10 12"/>
  </g>
</svg>
