<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trademark Flooring heritage barn">
  <defs>
    <linearGradient id="tfRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A3F16"/>
      <stop offset="100%" stop-color="#5A2E0F"/>
    </linearGradient>
    <linearGradient id="tfBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8641E"/>
      <stop offset="100%" stop-color="#9A4A15"/>
    </linearGradient>
  </defs>

  <!-- Rounded emblem background -->
  <rect x="3" y="3" width="94" height="94" rx="20" fill="#FBF3E8" stroke="#9A4A15" stroke-width="3"/>

  <!-- Ground line -->
  <rect x="20" y="74" width="60" height="4" rx="2" fill="#7A3F16"/>

  <!-- Barn roof -->
  <path d="M22 46 L50 26 L78 46 Z" fill="url(#tfRoof)"/>
  <!-- Roof overhang -->
  <path d="M20 47 L50 26 L80 47 L74 47 L50 31 L26 47 Z" fill="#4A2610"/>

  <!-- Barn body -->
  <rect x="27" y="46" width="46" height="28" fill="url(#tfBody)"/>

  <!-- Vertical plank lines -->
  <g stroke="#7A3F16" stroke-width="1" opacity="0.45">
    <line x1="38" y1="46" x2="38" y2="74"/>
    <line x1="50" y1="46" x2="50" y2="74"/>
    <line x1="62" y1="46" x2="62" y2="74"/>
  </g>

  <!-- Classic barn "X" doors -->
  <rect x="42" y="54" width="16" height="20" fill="#4A2610"/>
  <g stroke="#C8641E" stroke-width="1.6">
    <line x1="42" y1="54" x2="58" y2="74"/>
    <line x1="58" y1="54" x2="42" y2="74"/>
  </g>

  <!-- Hayloft window -->
  <circle cx="50" cy="41" r="4" fill="#FBF3E8" stroke="#4A2610" stroke-width="1.6"/>

  <!-- Roof peak star accent -->
  <circle cx="50" cy="22" r="2.4" fill="#E0A85C"/>
</svg>
