<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trademark Flooring tree">
  <g fill="none" stroke="#3A2A1A" stroke-linecap="round" stroke-linejoin="round">
    <!-- Trunk -->
    <path d="M60 116 L60 84" stroke-width="8.5"/>
    <!-- Roots -->
    <path d="M60 114 Q50 112 44 116 M60 114 Q70 112 76 116" stroke-width="4"/>

    <!-- Main branches -->
    <path d="M60 88 Q49 80 41 70" stroke-width="6"/>
    <path d="M60 88 Q71 80 79 70" stroke-width="6"/>
    <path d="M60 86 L60 66" stroke-width="6"/>

    <!-- Secondary branches -->
    <path d="M41 70 Q34 63 30 55" stroke-width="4"/>
    <path d="M41 70 Q44 64 46 57" stroke-width="4"/>
    <path d="M79 70 Q86 63 90 55" stroke-width="4"/>
    <path d="M79 70 Q76 64 74 57" stroke-width="4"/>
    <path d="M60 66 Q54 60 50 53" stroke-width="4"/>
    <path d="M60 66 Q66 60 70 53" stroke-width="4"/>

    <!-- Twigs -->
    <g stroke-width="2.4">
      <path d="M30 55 Q27 50 25 45"/>
      <path d="M46 57 Q45 51 45 46"/>
      <path d="M90 55 Q93 50 95 45"/>
      <path d="M74 57 Q75 51 75 46"/>
      <path d="M50 53 Q48 48 47 43"/>
      <path d="M70 53 Q72 48 73 43"/>
      <path d="M60 66 L60 52"/>
    </g>
  </g>

  <!-- Foliage canopy (sits atop the branch structure) -->
  <g fill="#3A2A1A">
    <circle cx="60" cy="38" r="23"/>
    <circle cx="43" cy="44" r="16"/>
    <circle cx="77" cy="44" r="16"/>
    <circle cx="49" cy="26" r="16"/>
    <circle cx="71" cy="26" r="16"/>
    <circle cx="60" cy="20" r="16"/>
    <circle cx="34" cy="40" r="11"/>
    <circle cx="86" cy="40" r="11"/>
  </g>
</svg>
